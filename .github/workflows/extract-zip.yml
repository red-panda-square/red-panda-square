name: Extract Zip File

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract zip file
        run: |
          cd $GITHUB_WORKSPACE
          unzip -q redpandaland-app-master.zip
          ls -la

      - name: Remove zip file
        run: |
          rm redpandaland-app-master.zip

      - name: Commit extracted files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Extract project folder structure from zip file" || true
          git push
